name: Currentfold
options:
  bundleIdPrefix: no.currentfold
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  minimumXcodeGenVersion: 2.46.0
packages:
  CurrentfoldBrand:
    path: ../../packages/brand/ios
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: 9.1.0
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
targets:
  Currentfold:
    type: application
    platform: iOS
    sources:
      - path: Currentfold
      - path: ../../packages/brand/ios/AppAssets.xcassets
        buildPhase: resources
    dependencies:
      - package: CurrentfoldBrand
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: no.currentfold.reader
        PRODUCT_NAME: Currentfold
        INFOPLIST_FILE: Currentfold/Support/Info.plist
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: 2026.7.3
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENTFOLD_SERVER_URL: https://rssapp.badask.no
        CURRENTFOLD_ASSOCIATED_DOMAIN: rssapp.badask.no
        CURRENTFOLD_GOOGLE_CLIENT_ID: ""
        CURRENTFOLD_GOOGLE_SERVER_CLIENT_ID: ""
        CURRENTFOLD_GOOGLE_REVERSED_CLIENT_ID: ""
        CODE_SIGN_ENTITLEMENTS: Currentfold/Support/Currentfold.entitlements
  CurrentfoldTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CurrentfoldTests
      - path: ../../packages/api-contract/fixtures
        buildPhase: resources
    dependencies:
      - target: Currentfold
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: no.currentfold.reader.tests
        GENERATE_INFOPLIST_FILE: true
schemes:
  Currentfold:
    build:
      targets:
        Currentfold: all
        CurrentfoldTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - CurrentfoldTests
