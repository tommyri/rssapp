services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: rssapp
      POSTGRES_PASSWORD: rssapp
      POSTGRES_DB: rssapp
    ports:
      # 5433 on the host: a local Postgres already listens on 5432
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rssapp -d rssapp"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
